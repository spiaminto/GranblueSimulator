<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>그랑블루시뮬</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>

  <link href="/static/css/basic.css" rel="stylesheet">
  <link href="/static/css/common.css" rel="stylesheet">
  <link href="/static/css/battle/modals.css" rel="stylesheet">

  <style>

      .character-container {
          width: 100%;
          padding: 7px;
      }

      .icon-wrapper img {
          width: 100%;
      }

      .leader-character-icon-wrapper {
          display: inline-block;
          width: 48%;
          margin: 2px;
      }

      .leader-character-icon-wrapper img {
          width: 100%;
          box-shadow: 0 2px 5px #ddd;
          margin-bottom: 5px;
      }

      .character-name {
          text-overflow: ellipsis;
          white-space: nowrap;
          display: inline-block;
          width: 110%;
          overflow: hidden;

      }

  </style>
  <script src="https://code.jquery.com/jquery.min.js"></script>
  <script src="/js/common.js"></script>
  <script src="/static/js/basic.js"></script>
  <script>
      $(function () {
          $('.leader-character-icon-wrapper').on('click', function () {
              let characterId = $(this).attr('data-character-id');

              let $changeCharacterForm = $('#changeCharacterForm');

              let userId = $changeCharacterForm.find('input[name="userId"]').val();
              $changeCharacterForm.attr('action', `/users/${userId}/characters/${characterId}`).submit();
          });

      });
  </script>
</head>
<body class="bg-secondary-subtle">
<div id="container">
  <div class="page-header">
    <h1>캐릭터 상세</h1>
    <button class="btn btn-xxsm btn-outline-secondary" onclick="location.href='/'"><i class="bi bi-house"></i></button>
  </div>

  <div class="character-container">
    <div class="tile header">
    </div>

    <div class="leader-character-icon-container tile">
      <div class="leader-character-icon-wrapper" th:each="characterInfo: ${characterInfos}" th:data-character-id="${characterInfo.id}">
        <img src="/static/gbf/img/ci/110480_sw_1_01.png" th:src="${characterInfo.iconSrc}">
        <span class="character-name" th:text="${characterInfo.getName()}">이름이최대몇글자인거에요</span>
      </div>
    </div>

    <div class="info-wrapper basic tile">
    </div>



  </div><!-- .info-container -->

</div> <!-- #container -->

<!-- 스테이터스 모달 -->

        <h1 class="modal-title" id="statusModalLabel">상태 정보</h1>
      </div>
      <div class="modal-body">

        <!--              <i class="bi bi-question-circle"></i>-->
        <!--            </button>-->
        <!--          </div>-->
        <!--          <div class="collapse" id="estimatedAtkCollapse">-->
        <!--            기준 공격력은 현재 적의 공격력에 캐릭터의 방어력을 적용한 최소, 최대값 입니다. 그 외의 상태효과는 적용되지 않은 수치이므로 참고용으로만 사용하세요.-->

        <div class="status-effect-info-wrapper">
          <!--          <div class="statusEffect-info">-->

      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-secondary me-1" data-bs-dismiss="modal">
          닫기
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 캐릭터 변경폼 -->
<form id="changeCharacterForm" action="" method="get" style="display: none;">
  <input type="hidden" name="partyId" value="" th:value="${partyId}">
  <input type="hidden" name="userId" value="" th:value="${userId}">
  <input th:if="${fromCharacterId != null}" type="hidden" name="fromCharacterId" value="" th:value="${fromCharacterId}">
</form>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
