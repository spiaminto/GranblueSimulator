      body {

          font-size: 0.6rem;

      .page-header {
          font-size: 1.2rem;
          font-weight: bold;
          margin: 10px 0 0;
          padding-left: 0.5rem;
      }

      .name {
          font-size: 0.7rem;
          font-weight: bold;
      }

      .title {
          padding-left: 0.5rem;
          font-size: 0.9rem;
          font-weight: bold;
      }

      .bordered {
          border: 1px solid lightgray;
          border-radius: 5px;
      }

      .tile {
          margin: 7px auto;
          padding: 7px;
          background-color: white;
          box-shadow: 5px 5px 3px #ddd;
          border-radius: 7px;
      }

      .character-container {
          width: 100%;
          padding: 7px;
      }

      .character-icon-wrapper {
          width: 100%;
          padding: 7px;
      }

      .icon-wrapper {
          display: inline-block;
          width: 23%;
          margin: 2px;
      }

      .icon-wrapper img {
          width: 100%;
      }

      .job-icon-wrapper {
          width: 50%;
      }

      .job-icon-wrapper img {
          width: 100%;
          box-shadow: 0 2px 5px #ddd;
          margin-bottom: 5px;
      }

      .character-name {
          text-overflow: ellipsis;
          white-space: nowrap;
          display: inline-block;
          width: 110%;
          overflow: hidden;

      }

      .portrait-wrapper {
          margin-right: 10px;
          height: 100px;
          overflow: hidden;
      }

      .portrait-wrapper img {
          height: 110%;
      }


  </style>
  <script src="https://code.jquery.com/jquery.min.js"></script>
  <script src="/js/common.js"></script>
  <script>
      $(function () {

          let scale = window.innerWidth / 330;
          scale = scale > 2.0 ? 2.0 : scale;
          console.log('bodywidth = scale = ', window.innerWidth, scale)
          let container = document.querySelector('#container');
          container.style.transform = `scale(${scale})`;
          container.style.transformOrigin = 'top left';

          let $modalContent = $('.modal .modal-content');
          $modalContent.css('transform', `scale(${scale})`);
          $modalContent.css('transformOrigin', `left`);
          $modalContent.css('width', $('#container').width() - 20 + 'px');

      });
  </script>
