<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>홈</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>

  <link href="/static/css/basic.css" rel="stylesheet">
  <link href="/static/css/common.css" rel="stylesheet">
  <link href="/static/css/battle/modals.css" rel="stylesheet">

  <style>

      /* 유저 정보 */
      .user-info-container .user-info-wrapper {
          padding: 5px;
          font-size: 12px;
      }

      .user-info-container .user-info-wrapper span {
          margin: 0 10px;
      }

      /* room list*/
      #roomList {
          margin-top: 5px;
      }

      .room-list-item {
          display: flex;
          flex-wrap: wrap;
          background-color: rgba(200, 200, 200, 0.1);

          padding: 8px 5px;
          cursor: pointer;
      }

      .room-list-item:hover {
          background-color: rgba(13, 110, 253, 0.1);
      }

      .room-list-item .enemy-portrait {
          width: 70px;
          height: 70px;
          overflow: hidden;
          border-radius: 7px;
          box-shadow: 2px 2px 3px lightgray;
      }

      .room-list-item .enemy-portrait img {
          width: 250%;
          position: relative;
          left: -75%;
          top: -20%;
      }

      .room-list-item .room-info {
          padding: 2px 2px 2px 7px;
          width: 220px;
      }

      .room-info .room-header {
          display: flex;
          justify-content: space-between;
          align-items: center;

          margin-bottom: 3px;
          background-color: #eee;
          padding: 3px;
          border-radius: 5px;
      }

      .room-header .room-member-count {
          margin-left: auto;
      }


  </style>
  <script src="https://code.jquery.com/jquery.min.js"></script>
  <script src="/static/js/basic.js"></script>
  <script>

      $(function () {

          const params = new URLSearchParams(window.location.search);
          if (params.has('showRegisterModal') && params.get('showRegisterModal') === 'true') { // showRegisterModal=true
              document.getElementById('addUserBtn').click();
          }

          $('.room-list-item').on('click', function () {
              $('#enterRoomForm')
                  .find('input[name="roomId"]').val($(this).attr('data-room-id'))
                  .end()
                  .submit();
          });

      });
  </script>
</head>
<body>
<div id="container">

  <div class="page-header">
    <h1>전투 이력</h1>
    <button class="btn btn-xsm btn-outline-secondary" onclick="location.href='/'"><i class="bi bi-house"></i></button>
  </div>

  <div class="user-info-container tile">
    <div class="title-md">유저정보</div>
    <div sec:authorize="isAuthenticated()" class="user-info-wrapper">
      <span th:text="'닉네임 : ' + ${#authentication.name}"></span>
    </div>

  </div>

  <div class="room-list-container tile">
    <div class="title-md">전투 이력 목록</div>
    <ul id="roomList" class="list-group">
      <li class="list-group-item room-list-item"
          th:each="room : ${roomInfos}" th:data-room-id="${room.id}" data-roomId="1">
        <div class="enemy-portrait">
          <img src="" th:src="${room.enemyPortraitSrc}" alt="enemyPortrait">
        </div>
        <div class="room-info">
          <div class="room-header">
            <div class="name" th:text="${room.enemyName}"></div>
            <span class="badge bg-primary rounded-pill room-member-count"
                  th:text="${room.memberCount + '/' + room.maxMemberCount + '명 참가'}">0 명 참가</span>
          </div>
          <div>
            <span><i class="bi bi-clock"></i> 종료시각: <span th:text="${room.endedAt}"></span></span>
          </div>
          <div>
            <span th:text="'방장: ' + ${room.ownerUsername}">방장 : 방장ID</span>
          </div>
          <div th:text="${'상태: ' + room.roomStatus.displayName}"></div>
        </div>
      </li>
    </ul>
  </div>

  <div class="d-flex justify-content-end gap-2 tile" sec:authorize="isAuthenticated()">
    <button type="button" class="btn btn-xsm btn-outline-primary" onclick="location.href='/'">
      홈으로
    </button>
  </div>

</div> <!-- #container -->


<form action="/room/join" method="post" id="enterRoomForm">
  <input type="hidden" class="roomId" name="roomId"/>
  <input type="hidden" class="userId" name="userId" th:value="${#authentication.principal.user.id}"/>
  <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
