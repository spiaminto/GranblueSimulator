<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>그랑블루시뮬</title>
  <link rel="shortcut icon" href="/static/assets/img/ui/favicon.png" type="image/x-icon">
  <!-- lib -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" type="text/css" href="/js/slick/slick.css">
  <link rel="stylesheet" type="text/css" href="/js/slick/slick-theme.css">

  <link href="https://fonts.googleapis.com/css2?family=Lusitana:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
  <!-- static -->
  <link href="/css/common.css" rel="stylesheet">
  <link href="/css/battle/basic.css" rel="stylesheet">
  <link href="/css/battle/battle-canvas.css" rel="stylesheet">
  <link href="/css/battle/damage.css" rel="stylesheet">
  <link href="/css/battle/modals.css" rel="stylesheet">
  <link href="/css/battle/status-effect.css" rel="stylesheet">
  <link href="/css/battle/top-menu.css" rel="stylesheet">
  <link href="/css/battle/ability-slider.css" rel="stylesheet">
  <link href="/css/battle/command-container.css" rel="stylesheet">

  <style></style>

  <!--lib-->
  <script src="/js/vendors/require.js"></script>
  <script src="/js/vendors/jquery.js"></script>
  <!--static-->
  <script src="/js/common.js"></script>
  <script src="/js/battle/util.js"></script>
  <script src="/js/battle/objects.js"></script>
  <script src="/js/battle/eventListeners.js"></script>
  <script src="/js/battle/request-command.js"></script>
  <script src="/js/battle/process-move.js"></script>
  <script src="/js/battle/process-party.js"></script>
  <script src="/js/battle/process-enemy.js"></script>
  <script src="/js/battle/status-effect.js"></script>
  <script src="/js/battle/ability-rail.js"></script>
  <script src="/js/battle/audio-player.js"></script>
  <script src="/js/battle/state-manager.js"></script>
  <script src="/js/battle/state-renderer.js"></script>
  <script src="/js/battle/tutorial.js"></script>
  <!--gbfap-->
  <script src="/js/gbfap/animation.js"></script>
  <script src="/js/gbfap/load-actor.js"></script>
  <script src="/js/GBFML/util.js"></script>
  <script>

      // 모듈 로드
      window.require_is_configured = false;
      if (!window.require_is_configured) {
          require.config({
              baseUrl: "",
              paths: {
                  "slick": "/static/js/slick/slick",
                  "bootstrap": "https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min",
                  "createjs": "/static/js/vendors/createjs",
                  "underscore": "/static/js/vendors/underscore",
                  "backbone": "/static/js/vendors/backbone",
                  "lib/raid/extension": "/static/js/gbfap/raid_extension",
                  "lib/sound": "/static/js/gbfap/audio",
                  "js/actor": "/static/js/gbfap/actor",
                  "js/player": "/static/js/gbfap/player",
                  "js/loader": "/static/js/gbfap/loader",
              },
          });
          require([
              "slick", "underscore", "createjs", "backbone", "lib/sound",
              "lib/raid/extension", "js/actor", "js/player", "js/loader", "bootstrap"
          ], function (slick, underscore) {
              $(function () {
                  _ = underscore;

                  // 스케일 초기화
                  let scale = window.innerWidth / 330;
                  scale = scale > 2.0 ? 2.0 : scale;
                  console.log(`[scaleInit] innerWidth = ${window.innerWidth} scale = ${scale}`);
                  $('#container').css({'transform': `scale(${scale})`, 'transform-origin': 'top left'});
                  window.scale = scale;

                  // slick 로드
                  let $abilityPanels = $('#abilitySlider .ability-panel');
                  $abilityPanels.get().forEach(abilityPanel => {
                      $(abilityPanel).find('.other-move-info-button').attr('data-actor-index', $(abilityPanel).attr('data-actor-order'));
                  })
                  $('#abilitySlider').slick({speed: 200, arrows: false});

                  // 게임 상태 초기화 및 로드
                  initGameStatus().then(() => {
                      // assets, player, actor 로드
                      monkeypatch_createjs();
                      window.require_is_configured = true;
                      initActors();
                  });

                  // (상태 초기화 및 stage 로드 완료후) 로딩 오버레이 이벤트 리스너 등록
                  $('#loadingOverlay').one('actorLoadFinished', function () {
                      let $loadingOverlay = $(this);
                      let $fadeOverlay = $('#fadeOverlay');

                      // touch to start 보이게, loading 제거
                      let $readyStartInfoWrapper = $(this).find('.ready-start-info-wrapper');
                      $readyStartInfoWrapper.fadeTo('fast', 1);
                      $loadingOverlay.find('.loading-image-wrapper').fadeTo('fast', 0);

                      // 사운드 설정 확인 및 등록
                      let soundStatus = localStorage.getItem('soundStatus');
                      if (!soundStatus) localStorage.setItem('soundStatus', 'on');
                      else if (soundStatus === 'off') {
                          $('.sound-toggle-button').removeClass('btn-outline-light').addClass('btn-outline-secondary');
                          window.audio.updateDisabled(true);
                      }

                      $loadingOverlay.one('click', function () {
                          playSe(Sounds.ui.LOADING_READY.src);

                          $readyStartInfoWrapper.fadeTo(1, 0);
                          $loadingOverlay.find('.ready-image-wrapper').fadeTo('fast', 1);
                          $loadingOverlay.css('background-color', 'transparent');

                          setTimeout(() => {
                              // 오버레이 사라진 후 처리
                              $loadingOverlay.find('.ready-image-wrapper').fadeTo(1, 0);
                              $fadeOverlay.css({
                                  'transform': 'translateX(25%)',
                                  'transition': 'transform 0.2s ease-out',
                              }).on('transitionend', () => {
                                  $loadingOverlay.css('display', 'none');
                                  $fadeOverlay.css('display', 'none');
                              });

                              updateBgm(window.stage.processing.response);
                              player.play(Player.playRequest('actor-0', Player.c_animations.ENEMY_PHASE_1));

                              // 시작시 적 사망했을 경우 (또는 적 사망 새로고침)
                              if (stage.processing.response.moveType === MoveType.DEAD_DEFAULT) {
                                  let enemyDeadResponse = stage.processing.response;
                                  // hp 음수로 오는거 0 으로 변환
                                  let modedHps = [0, ...enemyDeadResponse.hps.slice(1)];
                                  let modedHpRates = [0, ...enemyDeadResponse.hpRates.slice(1)];
                                  gameStateManager.setState('hps', modedHps, {force: true});
                                  gameStateManager.setState('hpRates', modedHpRates, {force: true});

                                  setTimeout(() => processEnemyDead(enemyDeadResponse), 1500); // entry 끝나는거 고려
                              } else {
                                  doSync(); // 동기화 폴링 (적 사망시 동기화 안함)
                              }

                              // 시작시 아군 전원 사망했을 경우 (또는 아군 전원 사망 새로고침)
                              if (gameStateManager.getState('hps').slice(1).every(hp => hp <= 0) && player.getCharacters().length === 0) {
                                  gameStateManager.setState('isQuestFailed', true);
                                  player.lockPlayer(true);
                              }

                              // 튜토리얼
                              gameStateManager.setState('tutorialIndex', Math.min(gameStateManager.getState('currentTurn') - 1, 5));
                              setTimeout(() => $('#tutorialModalButton').click(), 1000);

                          }, 700);
                      });
                  });

              });
          });
      }
  </script>
</head>
<body>

<div id="container">

  <div id="fadeOverlay">
    <!-- 페이드 이미지용 -->
  </div>

  <div id="loadingOverlay">
    <div class="ready-image-wrapper">
      <img class="ready-image" src="/assets/img/ui/loading-ready.png">
    </div>
    <div class="ready-start-info-wrapper">
      <div>Touch to Start</div>
    </div>
    <div class="loading-image-wrapper">
      <img class="loading-image" src="/assets/img/ui/loading.png">
    </div>
  </div>

  <div id="battleCanvasTopMenu">
    <div class="top-menu-container d-flex justify-content-between align-items-center">
      <button type="button" class="btn btn-outline-light sound-toggle-button">sound</button>
      <div class="turn-indicator"><span class="value"
                                        th:text="${memberInfo.currentTurn}">1</span><span> turn</span></div>
      <div class="remaining-time-indicator"><i class="bi bi-stopwatch me-1"></i><span class="value">00:00</span></div>
      <button type="button" class="btn btn-outline-primary menu-modal-button" data-bs-toggle="modal"
              data-bs-target="#menuModal">메뉴
      </button>
    </div>
  </div>

  <div id="battleCanvas">

    <div class="waiting-video-container">
      <video class="waiting-video" muted playsinline loop preload="auto"
             src="/assets/video/gl/waiting.webm">
      </video>
    </div>

    <div class="turn-indicator-container">
      <div class="turn-indicator"><span>turn </span><span class="value" th:text="${memberInfo.currentTurn}">1</span>
      </div>
    </div>

    <div class="honor-container">
      <div class="honor-wrapper">
        <span class="honor-value">0000000</span>
      </div>
    </div>

    <div class="for-all-move-indicator-container">
    </div>

    <div class="move-name-info-container">
      <div class="move-name-info">
        <span class="move-name-info-text">어빌리티 이름 이름 123</span>
      </div>
    </div>

    <div class="omen-container omen-container-bottom enemy blinking-element">
      <div class="omen-text">
        <span class="omen-prefix">전조이름</span>
      </div>
    </div>

    <div class="enemy-info-container"
         th:data-initial-actor-id="${enemyInfo.id}"
         th:data-initial-actor-name="${enemyInfo.name}"
         th:data-initial-form-order="${enemyInfo.formOrder}"
         th:data-trigger-hps="${triggerHps}"
    >
      <div class="hp-container enemy">
        <div class="value-hp" th:text="${enemyInfo.getHpRate() + '%'}" th:data-hp="${enemyInfo.getHp()}">
          100%
        </div>
        <div class="progress hp-bar" role="progressbar" aria-label="enemy hp bar" aria-valuenow="100"
             aria-valuemin="0"
             aria-valuemax="100">
          <div class="progress-bar hp-bar-realtime bg-danger" style="width: 50%"
               th:style="${'width: ' + enemyInfo.hpRate + '%'}">
          </div>
        </div>
      </div>
      <div class="status-container enemy actor-0" data-actor-index="0">
        <div class="show-status-info-button-wrapper enemy">
          <button class="btn btn-outline-light btn-xxsm show-status-info-button">상세</button>
        </div>
      </div>
      <div class="d-flex">
        <div class="charge-turn-container enemy">
          <div class="charge-turn-label">CT</div>
        </div>
        <div class="omen-container enemy omen-container-top">
          <div class="omen-text">
            <span class="omen-prefix">전조 조건 </span>
            <span class="omen-value">값</span>
            <span class="omen-info">전조 설명</span>
          </div>
        </div>
      </div>
    </div>

    <div id="canvasContainer"></div>

    <div id="actorContainer">
      <div class="enemy actor-0">
      </div>
      <div class="party actor-1">
        <div class="guard-status" th:data-initial-guard-state="${guardStates[1]}">
          <img class="guard-status-image" src="/assets/img/gl/ui-guard-status.png" alt="guard-status">
          <div class="guard-status-effect"></div>
        </div>
      </div>
      <div class="party actor-2">
        <div class="guard-status" th:data-initial-guard-state="${guardStates[2]}">
          <img class="guard-status-image" src="/assets/img/gl/ui-guard-status.png" alt="guard-status">
          <div class="guard-status-effect"></div>
        </div>
      </div>
      <div class="party actor-3">
        <div class="guard-status" th:data-initial-guard-state="${guardStates[3]}">
          <img class="guard-status-image" src="/assets/img/gl/ui-guard-status.png" alt="guard-status">
          <div class="guard-status-effect"></div>
        </div>
      </div>
      <div class="party actor-4">
        <div class="guard-status" th:data-initial-guard-state="${guardStates[4]}">
          <img class="guard-status-image" src="/assets/img/gl/ui-guard-status.png" alt="guard-status">
          <div class="guard-status-effect"></div>
        </div>
      </div>
    </div>

    <div class="ability-back-button-wrapper">
      <button class="ability-back-button btn btn-sm"></button>
    </div>

    <div class="turn-playing-indicator-wrapper">
      <img class="turn-playing-indicator party" src="/assets/img/ui/ui-player-turn.png">
      <img class="turn-playing-indicator enemy" src="/assets/img/ui/ui-enemy-turn.png">
    </div>

    <!-- 채팅 오픈 버튼 -->
    <button class="btn btn-sm chat-modal-button" data-bs-toggle="modal" data-bs-target="#chatModal"></button>
    <!-- 채팅 팝업 -->
    <div class="chat-popup-container"></div>

  </div><!-- #battleCanvas -->

  <div id="commandContainer">

    <div id="abilityRailContainer">
      <div class="ability-rail-wrapper">
        <div id="abilityRail">
          <div class="rail-ability-dummy rail-ability-0"> <!-- 높이 유지용 더미 -->
            <img src="/assets/img/ch/paladin/ability-1.png">
          </div>
        </div>
      </div>
      <div id="attackButtonWrapper">
        <button class="attack-button" id="attackButton"></button>
        <img src="/assets/img/ui/ui-attack.png">
      </div>
    </div>

    <div id="partyCommandContainer">

      <div class="battle-member-wrapper">
        <div th:each="order : ${#numbers.sequence(1, 4, 1)}">
          <th:block th:with="characterInfo = ${battleCharacterInfoMap.get(order)}">
            <div class="battle-portrait"
                 th:if="${characterInfo != null}"
                 th:data-actor-order="${characterInfo.order}"
                 th:data-actor-id="${characterInfo.id}"
                 th:classappend="${'actor-' + order}">
              <img src="/assets/img/ch/paladin/battle-portrait.jpg" th:src="${characterInfo.portraitSrc}">
              <div class="hp-gauge-wrapper">
                <div class="hp-gauge">
                  <div class="barrier-value"><span class="value"></span></div>
                  <div class="hp-gauge-value"><span class="value" th:text="${characterInfo.hp}">123</span></div>
                  <div class="progress" role="progressbar">
                    <div class="progress-bar bg-gradient" style="width: 50%"
                         th:data-hp-rate="${characterInfo.hpRate}"
                         th:classappend="${characterInfo.hpRate <= 25 ? 'bg-danger' : ''}"
                         th:style="${'width: ' + characterInfo.hpRate + '%'}"></div>
                  </div>
                </div>
              </div>
              <div class="charge-gauge-wrapper">
                <div class="charge-gauge">
                  <div class="progress" role="progressbar">
                    <div class="progress-bar" style="width: 50%"
                         th:style="${'width: ' + characterInfo.chargeGauge + '%'}"></div>
                  </div>
                  <div class="progress additional"
                       th:classappend="${characterInfo.maxChargeGauge > 100 ? '' : 'hidden'}" role="progressbar">
                    <div class="progress-bar" style="width: 50%"
                         th:style="${'width: ' + characterInfo.chargeGauge + '%'}"></div>
                  </div>
                  <div class="charge-gauge-value"><span class="value" th:text="${characterInfo.chargeGauge}">50</span>%
                  </div>
                </div>
              </div>
              <div class="ability-usable-indicator-wrapper">
                <div class="ability-usable-indicator"></div>
                <div class="ability-usable-indicator"></div>
                <div class="ability-usable-indicator"></div>
                <div class="ability-usable-indicator"></div>
              </div>
            </div>

            <!--더미-->
            <div class="battle-portrait empty"
                 th:if="${characterInfo == null}">
              <img src="/assets/img/gl/ch-empty.jpg" th:data-seq="${order}">
            </div>
          </th:block>
        </div> <!-- th each -->
      </div> <!-- .battle-member-wrapper-->

      <div class="summon-button-wrapper">
        <div class="summon-portrait">
          <button class="summon-display-button" type="button" data-bs-toggle="collapse" data-bs-target="#summonCollapse"
                  aria-expanded="false" aria-controls="summonCollapse"></button>
          <img src="/assets/img/ui/ui-summon-active.png">
        </div>
        <div class="union-summon-chance-wrapper">
          <img class="union-summon-portrait" src="">
          <img src="/assets/img/ui/union-summon-chance.png">
        </div>
        <div class="summon-button-overlay command-overlay"></div>
      </div>

      <div class="summon-display-wrapper">
        <div class="collapse collapse-horizontal" id="summonCollapse">
          <div class="summon-collapse">
            <div class="summon-list clearfix">
              <!--
              <div class="summon-list-item"
                 data-move-id="${summon.id}"
                 data-order="${summon.order}"
                 >
                <img src="${summon.portraitImageSrc || '/assets/img/summon/empty.jpg'}">
                <div class="summon-cooldown ${cooldownClass}">${cooldownText}</div>
                <div class="summon-overlay command-overlay ${overlayClass}" data-move-id="${summon.id}"></div>
              </div>
              -->
            </div>
          </div>
        </div>
      </div>

      <div class="ability-slider-slide-button-wrapper to-right">
        <button class="btn btn-xxsm"><i class="bi bi-caret-right"></i></button>
      </div>
      <div class="ability-slider-slide-button-wrapper to-left">
        <button class="btn btn-xxsm"><i class="bi bi-caret-left"></i></button>
      </div>

      <div id="abilitySlider">
        <div class="slick-slider-item" th:each="characterInfo : ${battleCharacterInfoMap.values()}">
          <div class="ability-panel"
               th:data-actor-order="${characterInfo.order}" th:classappend="${'actor-' + characterInfo.order}">

            <div class="ability-battle-portrait">
              <img src="/assets/img/ch/paladin/battle-portrait.jpg"
                   th:src="${characterInfo.portraitSrc}">
              <div class="hp-gauge-wrapper">
                <div class="hp-gauge">
                  <div class="barrier-value"><span class="value"></span></div>
                  <div class="hp-gauge-value"><span class="value" th:text="${characterInfo.hp}">123</span></div>
                  <div class="progress" role="progressbar">
                    <div class="progress-bar bg-gradient" style="width: 50%"
                         th:classappend="${characterInfo.hpRate <= 25 ? 'bg-danger' : ''}"
                         th:style="${'width: ' + characterInfo.hpRate + '%'}"></div>
                  </div>
                </div>
              </div>
              <div class="charge-gauge-wrapper">
                <div class="charge-gauge">
                  <div class="progress" role="progressbar">
                    <div class="progress-bar" style="width: 50%"
                         th:style="${'width: ' + characterInfo.chargeGauge + '%'}"></div>
                  </div>
                  <div class="progress additional"
                       th:classappend="${characterInfo.maxChargeGauge > 100 ? '' : 'hidden'}" role="progressbar">
                    <div class="progress-bar" style="width: 50%"
                         th:style="${'width: ' + characterInfo.chargeGauge + '%'}"></div>
                  </div>
                  <div class="charge-gauge-value"><span class="value" th:text="${characterInfo.chargeGauge}">50</span>%
                  </div>
                </div>
              </div>
            </div>

            <div class="panel-wrapper">
              <button class="btn btn-outline-light btn-xxsm other-move-info-button">서포트,<br>오의 상세</button>

              <div class="charge-attack-wrapper">
                <div class="charge-attack-info">
                <span class="charge-attack-name fw-bold" th:text="${'[오의] ' + characterInfo.chargeAttack.name}">
                  오의 이름
                </span>
                  <span> : </span>
                  <span class="charge-attack-text" th:text="${characterInfo.chargeAttack.info}">
                  오의 설명
                </span>
                </div>
              </div>

              <div class="ability-wrapper">
                <!--
                  <div class="ability-icon"
                       data-move-id="${ability.id}"
                       data-order="${ability.order}"
                       >
                      <img src="${ability.iconImageSrc || ''}" alt="abilityIcon"/>
                      <div class="ability-cooldown-text ${cooldownText ? '' : 'invisible'}">
                          <span class="value">${cooldownText ? cooldownText : '00'}</span>
                      </div>
                      <div class="ability-overlay command-overlay ${isReady ? '' : 'not-ready'}"></div>
                  </div>
                 -->
              </div>

            </div> <!-- .panel-wrapper -->

            <div class="status-container party" th:classappend="${'actor-' + characterInfo.order}"
                 th:data-actor-index="${characterInfo.order}">
              <div class="show-status-info-button-wrapper">
                <button class="btn btn-outline-light btn-xxsm show-status-info-button">상세</button>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

    <div class="advanced-command-container">
      <div class="guard-button-wrapper">
        <div class="guard-button party-1">
          <img class="guard-img" src="/assets/img/gl/ui-guard-off.png" alt="guard-image">
        </div>
        <div class="guard-button party-2">
          <img class="guard-img" src="/assets/img/gl/ui-guard-off.png" alt="guard-image">
        </div>
        <div class="guard-button party-3">
          <img class="guard-img" src="/assets/img/gl/ui-guard-off.png" alt="guard-image">
        </div>
        <div class="guard-button party-4">
          <img class="guard-img" src="/assets/img/gl/ui-guard-off.png" alt="guard-image">
        </div>
      </div>
      <div class="fatal-chain-gauge-wrapper"
           th:data-move-id="${fatalChainInfo.id}"
           th:data-actor-id="${leaderActorId}"
           th:data-name="${fatalChainInfo.name}"
           th:data-info="${fatalChainInfo.info}"
           th:data-icon-image-src="${fatalChainInfo.iconImageSrc}">
        <div class="fatal-chain-gauge-label">FC</div>
        <div class="progress fatal-chain-gauge" role="progressbar">
          <div class="progress-bar bg-warning" style="width: 10%"
               th:style="${'width: ' + fatalChainGauge + '%'}"></div>
          <div class="fatal-chain-gauge-value"><span class="value" th:text="${fatalChainGauge}">10</span>%</div>
        </div>
        <div class="fatal-chain-gauge-info" th:text="${fatalChainInfo.name + ' : ' + fatalChainInfo.info}"
             th:data-fatal-chain-move-id="${fatalChainInfo.id}">페이탈 체인 정보
        </div>
      </div>
    </div>

    <div class="sub-command-container">
      <button type="button" class="btn btn-sm btn-outline-success potion-modal-button" data-bs-toggle="modal"
              data-bs-target="#potionModal">
        회복
