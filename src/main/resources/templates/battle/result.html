<!doctype html>
<html lang="ko">
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>전투 결과</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
  <style>
    #container {
      padding: 0 1rem;
    }

    p {
        margin-bottom: 0.5rem; /* reboot.scss 1rem override */
    }

    .card {
        margin-bottom: 1rem;
    }

    .home-button {
        display: block;
        margin: 0 auto;
    }

  </style>
</head>
<body>
  <div id="container">
    <h1>전투결과</h1>

    <div id="questInfoContainer">
      <div class="card">
        <h5 class="card-header">퀘스트 정보</h5>
        <div class="card-body">
<!--          <h5 class="card-title"></h5>-->
          <p class="card-text">적: <span th:text="${resultInfo.enemyName}">이름</span></p>
          <p class="card-text">종료 시각: <span th:text="${resultInfo.endedAt}">2025-11-11 11:33:44</span></p>
          <p class="card-text">참전 인수: <span th:text="${resultInfo.enterUserCount}">3</span>명</p>
        </div>
      </div>
    </div>

    <div id="itemInfoContainer">
      <div class="card">
        <h5 class="card-header">아이템 정보</h5>
        <div class="card-body">
          <p class="card-text">미구현</p>
        </div>
      </div>
    </div>

    <div id="memberInfoContainer">
      <div class="card">
        <h5 class="card-header">내 전투 결과</h5>
        <div class="card-body">
          <p class="card-text">진행 턴 : <span th:text="${myInfo.totalTurns}">22</span>턴</p>
          <p class="card-text">진행 시간: <span th:text="${myInfo.totalTime}">22:31</span></p>
          <p class="card-text">적 체력: <span th:text="${myInfo.enemyHp}">12억</span></p>
          <p class="card-text">가한 데미지: <span th:text="${myInfo.formattedTotalDamage}">1억 2345만 1234</span></p>
          <p class="card-text">가한 데미지 비율: <span th:text="${myInfo.totalDamageRate}">55</span>%</p>
          <p class="card-text">획득 공헌도: <span th:text="${myInfo.totalHonor}">123만 3456</span></p>
        </div>
      </div>
    </div>

    <div id="membersInfoContainer">
      <div class="card">
        <h5 class="card-header">멤버 전투 결과</h5>
        <div class="card-body" th:each="memberInfo : ${memberInfos}">
          <h5 class="card-title">아이디: <span th:text="${memberInfo.username}">테스트123</span></h5>
          <p>공헌도 순위: <span th:text="${memberInfoStat.count}"></span>등</p>
          <p class="card-text">가한 데미지: <span th:text="${memberInfo.formattedTotalDamage}">1억 2345만 1234</span></p>
          <p class="card-text">가한 데미지 비율: <span th:text="${memberInfo.totalDamageRate}">55</span>%</p>
          <p class="card-text">획득 공헌도: <span th:text="${memberInfo.totalHonor}">123만 3456</span></p>
        </div>
      </div>
    </div>

    <button class="btn btn-outline-primary home-button" onclick="location.href = '/'">홈으로</button>
  </div> <!-- #container -->


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
