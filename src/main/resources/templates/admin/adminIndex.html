<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>홈</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>

  <link href="/static/css/basic.css" rel="stylesheet">
  <link href="/static/css/common.css" rel="stylesheet">
  <link href="/static/css/battle/modals.css" rel="stylesheet">

  <style>

      /* 유저 정보 */
      .user-info-container .user-info-wrapper {
          padding: 5px;
          font-size: 12px;
      }

      .user-info-container .user-info-wrapper span {
          margin: 0 10px;
      }

      #loginForm {
          font-size: 12px;
      }

      #loginForm label {
          padding: 6px;
      }

      #loginForm .field-error {
          color: red;
          border-color: red;
      }

      #loginForm #loginErrorMessage {
          padding: 8px;
      }

      /* room list*/
      #roomList {
          margin-top: 5px;
      }

      .room-list-item {
          display: flex;
          flex-wrap: wrap;
          background-color: rgba(200, 200, 200, 0.1);

          padding: 8px 5px;
          cursor: pointer;
      }

      .room-list-item:hover {
          background-color: rgba(13, 110, 253, 0.1);
      }

      .room-list-item .enemy-portrait {
          width: 70px;
          height: 70px;
          overflow: hidden;
          border-radius: 7px;
          box-shadow: 2px 2px 3px lightgray;
      }

      .room-list-item .enemy-portrait img {
          width: 250%;
          position: relative;
          left: -75%;
          top: -20%;
      }

      .room-list-item .room-info {
          padding: 0 0 0 7px;
          width: 220px;
      }

      .room-info .room-header {
          display: flex;
          justify-content: space-between;
          margin-bottom: 5px;
          align-items: center;
      }

      .room-header .room-member-count {
          margin-left: auto;
      }

      .hp-container {
          display: flex;
          align-items: center;
      }

      .hp-container .hp-bar {
          width: 85%;
          height: 7px;
          background-color: grey;
      }

      .room-list-item .room-message-wrapper {
          margin: 3px 0;
          padding: 4px 6px;
          width: 100%;
          background-color: white;
          box-shadow: 2px 2px 3px #ccc;
          border-radius: 7px;
          font-size: 9px;
      }

      .enter-room-message {
          font-size: 12px;
          padding: 3px;
      }

      #roomDeleteEndButton {
          display: none;
      }

  </style>
  <script src="https://code.jquery.com/jquery.min.js"></script>
  <script src="/static/js/basic.js"></script>
  <script>

      $(function () {


          // needLogin 이 true 이고, 로그인 정보패널이 없으면 로그인 모달을 띄움
          const params = new URLSearchParams(window.location.search);
          if (params.has('needLogin') && params.get('needLogin') === 'true') {
              // needLogin=true가 존재할 때 실행할 코드
              triggerLoginModal();
          }

          $("#logoutBtn").on('click', function () {
              $("#logoutForm").submit();
          })

          function triggerLoginModal() {
              document.getElementById('loginModalTriggerBtn').click();
          }

          $('#loginForm').on('submit', function (event) {
              event.preventDefault(); // 폼 기본 제출 막기

              // 직렬화, 객체변환
              let formArray = $(this).serializeArray();
              let formData = {};
              $.each(formArray, function (_, field) {
                  formData[field.name] = field.value;
              });

              console.log('[login-process] submit, formData = ', formData);

              $.ajax({
                  type: 'POST',
                  url: '/login-process',
                  headers: {
                      'X-CSRF-TOKEN': $('#csrfToken').val()
                  },
                  data: formArray,
                  success: function (response) {
                      console.log('[login-process] response = ', response);
                      if (response.success === true) {
                          location.href = '/';
                      }
                  },
                  error: function (xhr) {
                      let response = xhr.responseJSON;
                      console.log('[login-process] error, response = ', response);
                      if (response.error === true) {
                          $('#loginErrorMessage').text(response.message);
                      }
                  }
              });
          });

          $('.room-list-item').on('click', function () {
              $('#enterRoomForm input[name="roomId"]').val($(this).attr('data-room-id'));
              $('#enterRoomModalTriggerBtn').click();
          })

          $('#roomDeleteStartButton').on('click', function () {
              $('.room-list-item').addClass('bg-danger-subtle').off('click').on('click', roomDeleteHandler);
              $('#roomDeleteEndButton').show();
          })

          $('#roomDeleteEndButton').on('click', function () {
              location.replace('/admin'); // 걍 새로고침
          })

          function roomDeleteHandler() {
              let roomMessage = $(this).find('.room-header .message').text();
              if (!confirm('삭제하려는 방: ' + roomMessage)) return;
              let roomId = $(this).attr('data-room-id');
              console.log('[roomDeleteHandler] roomId = ', roomId);
              $.ajax({
                  type: 'DELETE',
                  url: 'api/admin/room/' + roomId,
                  headers: {
                      'X-CSRF-TOKEN': $('#csrfToken').val()
                  },
                  success: function (response) {
                      console.log('[roomDeleteHandler] response = ', response);
                      location.reload();
                  }
              })
          }

      });
  </script>
</head>
<body>
<div id="container">

  <div class="page-header">
    <h1>그랑블루 전투 시뮬레이터</h1>
    <button class="btn btn-xsm btn-outline-secondary" onclick="location.href='/'"><i class="bi bi-house"></i></button>
  </div>

  <div class="user-info-container tile">
    <div class="title-md">유저정보</div>
    <div sec:authorize="isAnonymous()">
      <span>로그인이 필요합니다</span>
      <div class="d-flex justify-content-end gap-2">
        <button sec:authorize="isAnonymous()"
                id="loginModalTriggerBtn" type="button" class="btn btn-xsm btn-outline-primary" data-bs-toggle="modal"
                data-bs-target="#loginModal">
          로그인
        </button>
        <button sec:authorize="isAnonymous()"
                id="addUserBtn" type="button" class="btn btn-xsm btn-outline-success"
                onclick="location.href = '/user/add'">
          회원가입
        </button>
        <button id="logoutBtn" sec:authorize="isAuthenticated()"
                type="button" class="btn btn-xsm btn-outline-primary">
          로그아웃
        </button>
        <form id="logoutForm" method="POST" action="/logout" style="display: none">
          <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
        </form>
      </div>
    </div>
    <div sec:authorize="isAuthenticated()" class="user-info-wrapper">
      <span th:text="'닉네임 : ' + ${#authentication.name}"></span>
      <span class="mark" th:text="'선택파티 : ' + ${partyInfo.name}"></span>
    </div>

    <!-- 모달 트리거 -->
    <div class="d-flex justify-content-end gap-2">
      <button id="createRoomModalTriggerBtn" type="button" class="btn btn-xsm btn-outline-primary"
              sec:authorize="isAuthenticated()"
              data-bs-toggle="modal" data-bs-target="#staticBackdrop">
        방 만들기
      </button>
      <button id="setPartyBtn" type="button" class="btn btn-xsm btn-outline-success"
              sec:authorize="isAuthenticated()"
              th:data-url="@{/users/{id}/parties(id=${#authentication.principal.user.id})}"
              onclick="location.href=this.dataset.url">
        파티 편성
      </button>
    </div>

  </div>

  <div class="room-list-container tile">
    <div class="title-md">방 목록</div>
    <ul id="roomList" class="list-group">
      <li class="list-group-item room-list-item"
          th:each="room : ${roomInfos}" th:data-room-id="${room.id}" data-roomId="1">
        <div class="enemy-portrait">
          <img src="" th:src="${room.enemyPortraitSrc}" alt="enemyPortrait">
        </div>
        <div class="room-info">
          <div class="fw-bold mark" th:text="${'상태: ' + room.roomStatus.displayName}"></div>
          <div class="room-header">
            <div class="name" th:text="${room.enemyName}"></div>
            <span class="badge bg-primary rounded-pill room-member-count"
                  th:text="${room.memberCount + '/' + room.maxMemberCount + '명 참가중'}">0 명 참가중</span>
            <span class="badge bg-primary rounded-pill room-list-item-is-playing"
                  th:text="'방장 : ' + ${room.ownerUsername}">방장 : 방장ID</span>
          </div>
          <div class="hp-container enemy">
            <div class="value-hp me-1" th:text="${room.enemyHpRate + '%'}">79%</div>
            <div class="progress hp-bar" role="progressbar">
              <div class="progress-bar hp-bar-realtime bg-danger" style="width: 99%"
                   th:style="${'width: ' + room.enemyHpRate + '%'}"></div>
              <div class="hp-trigger hp-trigger-1"></div>
            </div>
          </div>
        </div>
        <div class="room-message-wrapper">
          <span class="message" th:text="${room.info}">방 메시지</span>
        </div>
      </li>
    </ul>
  </div>

  <div id="adminMenu" class="d-flex justify-content-end gap-2 tile" sec:authorize="isAuthenticated()">
    <button id="roomDeleteStartButton" class="btn btn-sm btn-outline-danger">방 삭제</button>
    <button id="roomDeleteEndButton" class="btn btn-sm btn-danger ms-4">방 삭제 완료</button>
  </div>


</div> <!-- #container -->

<!-- 로그인 -->
<div class="modal fade" id="loginModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
     aria-labelledby="staticBackdropLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h1 class="modal-title fs-5" id="loginModalLabel">로그인</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <form id="loginForm" action="/login-process" method="post">
        <div class="modal-body">
          <label for="loginId">로그인 id</label>
          <input type="text" id="loginId" class="form-control" name="loginId" placeholder="로그인id 입력"/>
          <label for="password">비밀번호</label>
          <input id="password" type="password" name="password" class="form-control" placeholder="비밀번호 입력">
          <div class="login-error-message">
            <p id="loginErrorMessage" class="field-error"></p>
          </div>
          <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">닫기</button>
          <button type="submit" id="loginModalLoginBtn" class="btn btn-sm btn-outline-primary">로그인</button>
        </div>
      </form>

    </div>
  </div>
</div>

<!-- 방 만들기 모달 -->
<div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
     aria-labelledby="staticBackdropLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="staticBackdropLabel">방 만들기</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form action="/room" method="post" th:object="${roomAddForm}" id="roomAddForm">
        <div class="modal-body">
          <label for="roomMessage">로비에 띄울 메시지</label>
          <input type="text" id="roomMessage" th:field="*{message}" class="form-control" name="name"
                 placeholder="최대 16 자 까지 허용합니다." th:errorclass="is-invalid"/>
          <div class="invalid-feedback" th:errors="*{message}"> 메시지 오류</div>
          <input type="hidden" id="csrfToken" name="_csrf" th:value="${_csrf.token}"/>
          <div class="modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">닫기</button>
            <button type="submit" id="twentyGameStartBtn" class="btn btn-sm btn-outline-primary">만들기</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- 방 입장 Modal -->
<button id="enterRoomModalTriggerBtn" type="button" class="btn btn-sm btn-outline-primary d-none"
        sec:authorize="isAuthenticated()"
        data-bs-toggle="modal" data-bs-target="#enterRoomModal">
  입장
</button>
<div class="modal fade" id="enterRoomModal" data-bs-keyboard="false" tabindex="-1"
     aria-labelledby="enterRoomModalTitle" aria-hidden="true" sec:authorize="authenticated">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="enterRoomModalTitle">방 입장</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="enter-room-message">
          <span th:text="${partyInfo.name + ' '}">파티 이름</span>
          파티로 입장합니다. 파티는 편성에서 변경할 수 있습니다.
        </div>
        <div class="party-container">
          <div class="party-wrapper" th:data-party-id="${partyInfo.id}">
            <div class="party-body">
              <div class="base-character-info-wrapper">
                <div class="base-character-info" th:each="characterInfo : ${partyInfo.characterInfos}">
                  <div class="base-character-portrait" th:data-character-id="${characterInfo.id}">
                    <img src="/" th:src="${characterInfo.portraitSrc}">
                  </div>
                  <div class="base-character-name" th:text="${characterInfo.name}">캐릭이름</div>
                </div>


                <!--          <div class="base-character-info">-->

                <!--            </div>-->
                <!--          </div>-->
                <!--          <div class="base-character-info">-->
                <!--            <div class="base-character-portrait">-->
                <!--              <img src="/static/moveVisuals/img/ch/paladin/battle-portrait.jpg">-->
                <!--            </div>-->
                <!--          </div>-->
                <!--          <div class="base-character-info">-->
                <!--            <div class="base-character-portrait">-->
                <!--              <img src="/static/moveVisuals/img/ch/paladin/battle-portrait.jpg">-->
                <!--            </div>-->
                <!--          </div>-->

              </div>
              <div class="summon-info-wrapper">
                <div class="summon-info" th:each="summonInfo : ${partyInfo.summonInfos}">
                  <div class="summon-portrait">
                    <img src="/" th:src="${summonInfo.portraitSrc}">
                  </div>
                  <div class="base-character-name" th:text="${summonInfo.name}"> 솬석이름</div>
                </div>

                <!--          <div class="summon-info">-->
                <!--            <div class="summon-portrait">-->
                <!--              <img src="/static/moveVisuals/img/summon/zeus/battle-portrait.jpg">-->
                <!--            </div>-->
                <!--          </div>-->
                <!--          <div class="summon-info">-->
                <!--            <div class="summon-portrait">-->
                <!--              <img src="/static/moveVisuals/img/summon/zeus/battle-portrait.jpg">-->
                <!--            </div>-->
                <!--          </div>-->
                <!--          <div class="summon-info">-->
                <!--            <div class="summon-portrait">-->
                <!--              <img src="/static/moveVisuals/img/summon/zeus/battle-portrait.jpg">-->
                <!--            </div>-->
                <!--        </div>-->

              </div>
            </div>
          </div>
        </div>
        <form action="/room/join" method="post" id="enterRoomForm">
          <input type="hidden" class="roomId" name="roomId"/>
          <input type="hidden" class="userId" name="userId" th:value="${#authentication.principal.user.id}"/>
          <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
          <div class="modal-footer">
            <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">닫기</button>
            <button type="submit" id="enterRoomBtn" class="btn btn-sm btn-outline-primary">입장</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
