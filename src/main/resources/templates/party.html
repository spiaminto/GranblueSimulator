<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>그랑블루시뮬</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>

  <link href="/static/css/basic.css" rel="stylesheet">
  <link href="/static/css/common.css" rel="stylesheet">
  <link href="/static/css/battle/modals.css" rel="stylesheet">

  <style>

      .party-container {
          width: 100%;
      }

      .party-info-header.primary {
          background: #fff3cd;
          border-radius: 5px;
      }

      .party-wrapper .primary-indicator {
          cursor: pointer;
      }

      .party-info-header {
          display: flex;
          padding: 3px;
          justify-content: space-between;
          font-size: 13px;
          font-weight: bold;
      }

      .party-body {
          width: 100%;
      }

      .base-character-info-wrapper {
          width: 100%;
      }

      .base-character-info-wrapper::after {
          content: "";
          display: block;
          clear: both;
      }

      .base-character-info-wrapper .base-character-info {
          float: left;
          width: 23%;
          height: 150px;
          margin-right: 2%;
          overflow: hidden;
      }

      .base-character-info-wrapper .base-character-info:nth-child(4n) {
          margin-right: 0;
      }

      .base-character-portrait {
          height: 120px;
          overflow: hidden;
      }

      .base-character-portrait img {
          width: 100%;
      }

      .base-character-name {
          font-size: 11px;
          text-align: center;
      }

      .summon-info-wrapper {
          margin-top: 5px;
          width: 100%;
      }

      .summon-info-wrapper::after {
          content: "";
          display: block;
          clear: both;
      }

      .summon-info-wrapper .summon-info {
          float: left;
          width: 23%;
          height: 150px;
          margin-right: 2%;
          overflow: hidden;
      }

      .summon-portrait {
          height: 120px;
          overflow: hidden;
      }

      .summon-portrait img {
          width: 100%;
      }


  </style>
  <script src="https://code.jquery.com/jquery.min.js"></script>
  <script>
      $(function () {

          let scale = window.innerWidth / 330;
          scale = scale > 2.0 ? 2.0 : scale;
          console.log('bodywidth = scale = ', window.innerWidth, scale)
          let container = document.querySelector('#container');
          container.style.transform = `scale(${scale})`;
          container.style.transformOrigin = 'top left';

          $('.base-character-portrait').on('click', function () {
              let characterId = $(this).attr('data-character-id');
              let userId = $('#userIdInput').val();
              let partyId = $(this).closest('.party-wrapper').attr('data-party-id');

              $('#partyToCharacterForm input[name="partyId"]').val(partyId);
              $('#partyToCharacterForm').attr('action', `/users/${userId}/characters/${characterId}`);
              $('#partyToCharacterForm').submit();
          })

          $('.primary-indicator').on('click', function () {
              if (!confirm("이 파티를 사용합니다.")) return;

              let userId = $('#userIdInput').val();
              let partyId = $(this).closest('.party-wrapper').attr('data-party-id');
              $('#primaryPartyForm input[name="partyId"]').val(partyId);
              $('#primaryPartyForm').attr('action', `/users/${userId}`).submit();
          });

      });


  </script>
</head>
<body class="bg-secondary-subtle">
<div id="container">
  <div class="page-header">
    <h1>캐릭터 상세</h1>
    <button class="btn btn-xxsm btn-outline-secondary" onclick="location.href='/'"><i class="bi bi-house"></i></button>
  </div>

  <div class="party-container">
    <div class="tile">
      캐릭터 또는 소환석을 누르면 상세 설명을 확인할 수 있습니다.
    </div>
    <div class="party-wrapper tile" th:each="partyInfo : ${partyInfos}" th:data-party-id="${partyInfo.id}">
      <div class="party-info">
        <div class="party-info-header" th:classappend="${partyInfo.isPrimary() ? 'primary' : ''}">
          <div class="title-md" th:text="${partyInfo.name}">파티 1번 이름</div>
          <button class="primary-indicator btn-xsm btn btn-outline-primary"
                  th:text="${partyInfo.isPrimary() ? '사용중' : '사용하기'}"
                  th:disabled="${partyInfo.isPrimary()}"> 사용
          </button>
        </div>
        <div class="party-info-text" th:text="${partyInfo.info}">
          이 파티는 어쩌구 저쩌구 파티의 설명이 이어진다. 파티의 설명은 대략 두세줄 정도로 예상하고 있다.
          만능형 파티는 전조 대응력이 높고 공격력과 생존력 모두 고르게 좋은 파티입니다.
        </div>
      </div>
      <div class="party-body">
        <div class="base-character-info-wrapper">
          <div class="base-character-info" th:each="characterInfo : ${partyInfo.characterInfos}">
            <div class="base-character-portrait" th:data-character-id="${characterInfo.id}">
              <img src="/" th:src="${characterInfo.portraitSrc}">
            </div>
            <div class="base-character-name" th:text="${characterInfo.name}"> 캐릭이름</div>
          </div>


          <!--          <div class="base-character-info">-->
          <!--            <div class="base-character-portrait">-->
          <!--              <img src="/static/moveVisuals/img/ch/paladin/battle-portrait.jpg">-->
          <!--            </div>-->
          <!--          </div>-->
          <!--          <div class="base-character-info">-->
          <!--            <div class="base-character-portrait">-->
          <!--              <img src="/static/moveVisuals/img/ch/paladin/battle-portrait.jpg">-->
          <!--            </div>-->
          <!--          </div>-->
          <!--          <div class="base-character-info">-->
          <!--            <div class="base-character-portrait">-->
          <!--              <img src="/static/moveVisuals/img/ch/paladin/battle-portrait.jpg">-->
          <!--            </div>-->
          <!--          </div>-->

        </div>
        <div class="summon-info-wrapper">
          <div class="summon-info" th:each="summonInfo : ${partyInfo.summonInfos}">
            <div class="summon-portrait">
              <img src="/" th:src="${summonInfo.portraitSrc}">
            </div>
            <div class="base-character-name" th:text="${summonInfo.name}"> 솬석이름</div>
          </div>

          <!--          <div class="summon-info">-->
          <!--            <div class="summon-portrait">-->
          <!--              <img src="/static/moveVisuals/img/summon/zeus/battle-portrait.jpg">-->
          <!--            </div>-->
          <!--          </div>-->
          <!--          <div class="summon-info">-->
          <!--            <div class="summon-portrait">-->
          <!--              <img src="/static/moveVisuals/img/summon/zeus/battle-portrait.jpg">-->
          <!--            </div>-->
          <!--          </div>-->
          <!--          <div class="summon-info">-->
          <!--            <div class="summon-portrait">-->
          <!--              <img src="/static/moveVisuals/img/summon/zeus/battle-portrait.jpg">-->
          <!--            </div>-->
          <!--        </div>-->

        </div>
      </div>
    </div>
  </div>

</div><!-- .party-container -->

<form id="primaryPartyForm" action="" method="post">
  <input id="userIdInput" type="hidden" name="userId" th:value="${#authentication.principal.id}">
  <input id="primaryPartyId" type="hidden" name="partyId"/>
  <input type="hidden" name="_method" value="PATCH"/>
  <input id="csrfToken" type="hidden" name="_csrf" th:value="${_csrf.token}"/>
</form>

<form id="partyToCharacterForm" action="/" method="get">
  <input type="hidden" name="partyId" value="">
</form>


</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
