  <script>
      $(function () {

          // 평타 모션 속도조정
          // $('.motion-attack').each(function (index, item) {
          //     $(item).prop('playbackRate', '0.9');
          // })

          // 오디오 뮤트 해제
          $('audio').each(function (index, item) {
              item.muted = !item.muted;
          })


          $('#audioPlayButton').on('click', function () {
              document.getElementById('audioPlaying').currentTime = 0;
              document.getElementById('audioPlaying').play();
          })

          $('#attackButton').on('click', function () {
              processTurn();
          })

          $('#abilitySlider').slick({arrows: false});

          // 어빌리티 duratinon 로드를 위해 미리 재생 및 data-duration 추가
          $('.motion-ability').each(function (index, item) {
              let abilityVideo = $(this).get(0);
              abilityVideo.play();
              abilityVideo.addEventListener('durationchange', function () {
                  let duration = abilityVideo.duration;
                  this.dataset.duration = duration;
              })
          })

          $('#abilitySlider .ability-icon').on('click', function () {
              let charOrder = $(this).closest('.ability-panel').data('characterOrder');
              let abilityOrder = $(this).data('abilityOrder');
              processAbility(charOrder, abilityOrder);
          });

      });
  </script>
